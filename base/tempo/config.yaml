apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: monitoring

data:
  tempo.yaml: |
    auth_enabled: false

    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
            http:

    storage:
      trace:
        backend: local

        local:
          path: /tmp/tempo/traces
