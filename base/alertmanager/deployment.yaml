apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app: alertmanager

spec:
  replicas: 1

  selector:
    matchLabels:
      app: alertmanager

  template:
    metadata:
      labels:
        app: alertmanager

    spec:
      containers:
      - name: alertmanager

        image: prom/alertmanager:latest

        args:
        - --config.file=/etc/alertmanager/alertmanager.yml
        - --storage.path=/alertmanager

        ports:
        - name: web
          containerPort: 9093

        resources:
          requests:
            cpu: 100m
            memory: 128Mi

          limits:
            cpu: 500m
            memory: 512Mi

        volumeMounts:
        - name: config
          mountPath: /etc/alertmanager

        - name: data
          mountPath: /alertmanager

        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9093
          initialDelaySeconds: 30
          timeoutSeconds: 5

        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9093
          initialDelaySeconds: 5
          timeoutSeconds: 5

      volumes:

      - name: config
        configMap:
          name: alertmanager-config

      - name: data
        emptyDir: {}
