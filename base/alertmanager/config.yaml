apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring

data:
  alertmanager.yml: |

    route:
      receiver: slack-alerts

      group_wait: 10s
      group_interval: 30s
      repeat_interval: 1h

    receivers:

    - name: slack-alerts

      slack_configs:

      - api_url: https://hooks.slack.com/services/XXXXX/YYYYY/ZZZZZ
        channel: '#alerts'

        title: '{{ .CommonAnnotations.summary }}'
        text: '{{ .CommonAnnotations.description }}'

        send_resolved: true

    - name: email-alerts

      email_configs:

      - to: yourmail@example.com
        from: yourmail@example.com

        smarthost: smtp.gmail.com:587

        auth_username: yourmail@example.com
        auth_password: YOUR_GMAIL_APP_PASSWORD

        require_tls: true
