apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: monitoring
  labels:
    app: otel-collector

spec:
  replicas: 1

  selector:
    matchLabels:
      app: otel-collector

  template:
    metadata:
      labels:
        app: otel-collector

    spec:
      containers:
      - name: otel-collector

        image: otel/opentelemetry-collector-contrib:latest

        args:
        - --config=/etc/otel/otel-collector-config.yaml

        ports:
        - name: otlp-grpc
          containerPort: 4317

        - name: otlp-http
          containerPort: 4318

        - name: metrics
          containerPort: 8889

        - name: health
          containerPort: 13133

        resources:
          requests:
            cpu: 100m
            memory: 128Mi

          limits:
            cpu: 500m
            memory: 512Mi

        volumeMounts:
        - name: otel-config
          mountPath: /etc/otel

        livenessProbe:
          httpGet:
            path: /
            port: 13133
          initialDelaySeconds: 10
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /
            port: 13133
          initialDelaySeconds: 5
          periodSeconds: 5

      volumes:
      - name: otel-config
        configMap:
          name: otel-config
