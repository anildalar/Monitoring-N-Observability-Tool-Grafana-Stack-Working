apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-config
  namespace: monitoring

data:
  otel-collector-config.yaml: |

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    receivers:
      otlp:
        protocols:
          grpc:
          http:

    processors:
      batch:

    exporters:

      otlp_grpc:
        endpoint: tempo:4317
        tls:
          insecure: true

      debug:
        verbosity: detailed

    service:

      extensions: [health_check]

      pipelines:

        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug, otlp_grpc]
